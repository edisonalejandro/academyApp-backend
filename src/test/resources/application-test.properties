# =================================
# TEST DATABASE CONFIGURATION
# =================================
# H2 In-Memory Database para testing
spring.datasource.url=jdbc:h2:mem:academia_baile;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=a1b2c3d4e5

# JPA/Hibernate Configuration para testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Flyway deshabilitado en tests (usa create-drop de Hibernate con H2)
spring.flyway.enabled=false

# H2 Console (solo para debugging manual en tests locales)
spring.h2.console.enabled=false

# =================================
# JWT CONFIGURATION PARA TESTING
# =================================
app.jwt.secret=testSecretKeyForJWTTokenGenerationAndValidationThatIsSecureEnough256Bits
app.jwt.expiration-ms=3600000

# =================================
# LOGGING CONFIGURATION PARA TESTING
# =================================
logging.level.com.edidev.academyApp=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.dialect=ERROR

# =================================
# DISABLE SECURITY FOR TESTING
# =================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
