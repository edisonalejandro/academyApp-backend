# =================================
# PERFIL: prod (producción - Docker)
# =================================
# Activado automáticamente por docker-compose via:
#   SPRING_PROFILES_ACTIVE=prod
#
# Todas las variables son inyectadas por docker-compose desde infra/.env
# NUNCA hardcodear valores aquí.
# =================================

# DATABASE — variables inyectadas por docker-compose
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA — nunca mostrar SQL en producción
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# LOGGING — solo errores e info relevante en producción
logging.level.com.edidev.academyApp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
