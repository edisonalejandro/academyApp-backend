# =================================
# APPLICATION CONFIGURATION
# =================================
spring.application.name=academyApp

# Perfiles: usar 'local' en desarrollo (carga application-local.properties con credenciales reales)
# En producción, usar variables de entorno DB_USERNAME, DB_PASSWORD, JWT_SECRET
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# =================================
# DATABASE CONFIGURATION
# =================================
# PostgreSQL Database
# Override locally via application-local.properties or environment variables:
#   DB_USERNAME, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/academia_baile
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
# validate: Flyway gestiona el esquema; Hibernate solo valida que las entidades coincidan
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =================================
# FLYWAY CONFIGURATION
# =================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# =================================
# SERVER CONFIGURATION
# =================================
server.port=8080
server.servlet.context-path=/

# =================================
# JWT CONFIGURATION
# =================================
# JWT Secret - USAR variable de entorno en producción
# Para desarrollo local: usar application-local.properties
app.jwt.secret=${JWT_SECRET:changeme-replace-with-a-secure-256bit-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =================================
# CORS CONFIGURATION
# =================================
# Orígenes permitidos para CORS (separados por coma)
# En producción, especificar los dominios exactos del frontend
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# =================================
# LOGGING CONFIGURATION
# =================================
# Producción: solo WARN. Para debug SQL activar en application-local.properties:
#   logging.level.org.hibernate.SQL=DEBUG
#   logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
#   spring.jpa.show-sql=true
logging.level.com.edidev.academyApp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# =================================
# SWAGGER/OpenAPI CONFIGURATION
# =================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =================================
# VALIDATION MESSAGES
# =================================
spring.messages.basename=messages

# =================================
# FILE UPLOAD CONFIGURATION
# =================================
app.upload.dir=${UPLOAD_DIR:/app/uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
spring.messages.encoding=UTF-8


