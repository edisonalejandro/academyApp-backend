# =================================
# APPLICATION CONFIGURATION
# =================================
spring.application.name=academyApp

# Perfiles: usar 'local' en desarrollo (carga application-local.properties con credenciales reales)
# En producción, usar variables de entorno DB_USERNAME, DB_PASSWORD, JWT_SECRET
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# =================================
# DATABASE CONFIGURATION
# =================================
# PostgreSQL Database
# Override locally via application-local.properties or environment variables:
#   DB_USERNAME, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/academia_baile
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =================================
# SERVER CONFIGURATION
# =================================
server.port=8080
server.servlet.context-path=/

# =================================
# JWT CONFIGURATION
# =================================
# JWT Secret - USAR variable de entorno en producción
# Para desarrollo local: usar application-local.properties
app.jwt.secret=${JWT_SECRET:changeme-replace-with-a-secure-256bit-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =================================
# CORS CONFIGURATION
# =================================
# Orígenes permitidos para CORS (separados por coma)
# En producción, especificar los dominios exactos del frontend
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# =================================
# LOGGING CONFIGURATION
# =================================
logging.level.com.edidev.academyApp=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =================================
# SWAGGER/OpenAPI CONFIGURATION
# =================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =================================
# VALIDATION MESSAGES
# =================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8


